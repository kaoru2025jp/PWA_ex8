<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貸借対照表シミュレーター</title>

<style>
body {
  font-family: sans-serif;
  max-width: 600px;
  margin: auto;
  padding: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

.card {
  border-radius: 10px;
  padding: 15px;
  margin-top: 10px;
}

.left { background: #e3f2fd; }
.right { background: #ffebee; }

.big { font-size: 20px; font-weight: bold; }
</style>
</head>

<body>

<h2>入力</h2>

B: <input id="B" type="number" value="100" oninput="calc()">
S: <input id="S" type="number" value="20" oninput="calc()">
T: <input id="T" type="number" value="2" oninput="calc()">

V: <input id="V" type="number" value="1.5" oninput="calc()">

r1: <input type="range" min="0" max="2" step="0.01" id="r1" value="0.5" oninput="calc()">
<span id="r1v">0.5</span>

r2: <input type="range" min="0" max="2" step="0.01" id="r2" value="0.8" oninput="calc()">
<span id="r2v">0.8</span>

<div id="output"></div>

<script>
let timer;

function calc() {

  // ★連続通信防止（重要）
  clearTimeout(timer);
  timer = setTimeout(runCalc, 200);
}

async function runCalc() {

  const B = Number(document.getElementById("B").value);
  const S = Number(document.getElementById("S").value);
  const T = Number(document.getElementById("T").value);
  const V = Number(document.getElementById("V").value);
  const r1 = Number(document.getElementById("r1").value);
  const r2 = Number(document.getElementById("r2").value);

  document.getElementById("r1v").innerText = r1;
  document.getElementById("r2v").innerText = r2;

  if (!B || !T || !V) return;
  if (T === 0) return;

  const O = (B - S) / T;
  const B1 = (B * V - O);

  try {

    const res = await fetch("★GASのURL★", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ B1, V, r1, r2 })
    });

    const data = await res.json();

    const M1 = data.M1;
    const M2 = data.M2;

    const fixedAssets = Math.max(M1, 0);
    const currentAssets = Math.max(B - M1, 0);

    const capital = Math.max(M2, 0);
    const currentLiabilities = Math.max(B - M2, 0);

    document.getElementById("output").innerHTML = `
      <h3>O（シミュレーション値）</h3>
      <div class="big">${O.toFixed(3)}</div>

      <h3>貸借対照表</h3>

      <div class="card left">
        <b>借方（資産）</b><br>
        流動資産: ${currentAssets.toFixed(2)}<br>
        固定資産: ${fixedAssets.toFixed(2)}
      </div>

      <div class="card right">
        <b>貸方（負債・資本）</b><br>
        流動負債: ${currentLiabilities.toFixed(2)}<br>
        資本金: ${capital.toFixed(2)}
      </div>
    `;

  } catch (e) {
    console.log(e);
  }
}

// 初期表示
runCalc();
</script>

</body>
</html>
