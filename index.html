<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財務シミュレーター</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

input {
  margin: 5px;
}

.slider-box {
  margin: 10px 0;
}

#vValue {
  font-weight: bold;
}

canvas {
  max-width: 400px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>財務シミュレーター</h2>

B: <input id="B" type="number"><br>
O: <input id="O" type="number"><br>

<div class="slider-box">
V:
<input id="V" type="range" min="0" max="1" step="0.01" value="0.5">
<span id="vValue">0.50</span>
</div>

r1（リスク1）:
<input id="r1" type="range" min="0" max="1" step="0.01" value="0.3">
<span id="r1v">0.30</span><br>

r2（リスク2）:
<input id="r2" type="range" min="0" max="1" step="0.01" value="0.3">
<span id="r2v">0.30</span>

<h3>貸借対照表</h3>

<div>
流動資産: <span id="flowAssets">0</span><br>
固定資産: <span id="fixedAssets">0</span><br>
流動負債: <span id="flowLiabilities">0</span><br>
資本金: <span id="capital">0</span>
</div>

<h3>指標</h3>
T1: <span id="T1">0</span><br>
T2: <span id="T2">0</span>

<h3>資産構成</h3>
<canvas id="chart"></canvas>

<script>

const V = document.getElementById("V");
const r1 = document.getElementById("r1");
const r2 = document.getElementById("r2");

// 円グラフ
const ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
  type: "pie",
  data: {
    labels: ["流動資産", "固定資産"],
    datasets: [{
      data: [50, 50]
    }]
  }
});

// =========================
// リスク解釈モデル
// =========================
// r1 → 流動性リスク（大きいほど流動資産減る）
// r2 → 財務安定リスク（大きいほど資本減る）

function update() {

  const B = Number(document.getElementById("B").value || 0);
  const O = Number(document.getElementById("O").value || 1);

  const v = Number(V.value);
  const r1v = Number(r1.value);
  const r2v = Number(r2.value);

  document.getElementById("vValue").innerText = v.toFixed(2);
  document.getElementById("r1v").innerText = r1v.toFixed(2);
  document.getElementById("r2v").innerText = r2v.toFixed(2);

  // =========================
  // コアモデル
  // =========================

  // 流動資産（効率 × リスク減少）
  const flowAssets = B * v * (1 - r1v);

  // 固定資産（残り）
  const fixedAssets = Math.max(B - flowAssets, 0);

  // 負債
  const flowLiabilities = B * (1 - v);

  // 資本（リスクで減衰）
  const capital = Math.max(B - flowLiabilities * (1 + r2v), 0);

  const T1 = fixedAssets / (O || 1);
  const T2 = capital / (O || 1);

  // 表示更新
  document.getElementById("flowAssets").innerText = flowAssets.toFixed(2);
  document.getElementById("fixedAssets").innerText = fixedAssets.toFixed(2);
  document.getElementById("flowLiabilities").innerText = flowLiabilities.toFixed(2);
  document.getElementById("capital").innerText = capital.toFixed(2);

  document.getElementById("T1").innerText = T1.toFixed(3);
  document.getElementById("T2").innerText = T2.toFixed(3);

  // =========================
  // 円グラフ更新
  // =========================
  chart.data.datasets[0].data = [
    flowAssets,
    fixedAssets
  ];
  chart.update();
}

// イベント
V.addEventListener("input", update);
r1.addEventListener("input", update);
r2.addEventListener("input", update);
document.getElementById("B").addEventListener("input", update);
document.getElementById("O").addEventListener("input", update);

// 初期化
update();

</script>

</body>
</html>
