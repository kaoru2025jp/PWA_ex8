<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貸借対照表計算</title>

<style>
body { font-family: sans-serif; padding: 20px; }
input { margin: 5px; }
table { border-collapse: collapse; margin-top: 20px; }
td, th { border: 1px solid #333; padding: 8px; }
button { margin: 5px; }
</style>
</head>

<body>

<h2>データ入力</h2>

B: <input id="B" type="number"><br>
S: <input id="S" type="number"><br>
T: <input id="T" type="number"><br>
V: <input id="V" type="number"><br>
r1: <input id="r1" type="number"><br>
r2: <input id="r2" type="number"><br>

<!-- 追加ボタン① -->
<button onclick="calcO()">Oだけ計算</button>

<!-- 既存ボタン -->
<button onclick="run()">貸借対照表作成</button>

<div id="status"></div>

<!-- O表示 -->
<h3>Oの結果</h3>
<div id="oResult"></div>

<h2>貸借対照表</h2>

<table>
  <tr>
    <th>借方</th>
    <th>貸方</th>
  </tr>
  <tr>
    <td id="flowAssets"></td>
    <td id="flowLiabilities"></td>
  </tr>
  <tr>
    <td id="fixedAssets"></td>
    <td id="capital"></td>
  </tr>
</table>

<script>

//////////////////////////////
// ① 計算ロジック（変更なし）
//////////////////////////////
function calcValues(B, S, T, V) {
  const O = (B - S) / T;
  const B1 = B * V - O;
  return { O, B1 };
}

//////////////////////////////
// ② GAS通信（変更なし）
//////////////////////////////
async function sendToGAS(B1, V, r1, r2) {
  const res = await fetch("https://script.google.com/macros/s/AKfycbwmx2XJFWyqNg6D8m4LVikEQ9r4RJKXTv1Bj7u47MdsJkSLkd-PmaMUM3VtN9Q_ejfK8Q/exec", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ B1, V, r1, r2 })
  });

  return await res.json();
}

//////////////////////////////
// ③ 表示（変更なし）
//////////////////////////////
function render(B, M1, M2) {

  const flowAssets = M1;
  const fixedAssets = Math.max(B - M1, 0);

  const flowLiabilities = M2;
  const capital = Math.max(B - M2, 0);

  document.getElementById("flowAssets").innerHTML = flowAssets.toFixed(2);
  document.getElementById("flowLiabilities").innerHTML = flowLiabilities.toFixed(2);
  document.getElementById("fixedAssets").innerHTML = fixedAssets.toFixed(2);
  document.getElementById("capital").innerHTML = capital.toFixed(2);

  document.getElementById("status").innerHTML = "完了";
}

//////////////////////////////
// ★追加① Oだけ計算
//////////////////////////////
function calcO() {

  const B = Number(document.getElementById("B").value);
  const S = Number(document.getElementById("S").value);
  const T = Number(document.getElementById("T").value);
  const V = Number(document.getElementById("V").value);

  const { O } = calcValues(B, S, T, V);

  document.getElementById("oResult").innerHTML = "O = " + O.toFixed(3);
}

//////////////////////////////
// ★追加② メイン処理（変更なし構造）
//////////////////////////////
async function run() {

  const B = Number(document.getElementById("B").value);
  const S = Number(document.getElementById("S").value);
  const T = Number(document.getElementById("T").value);
  const V = Number(document.getElementById("V").value);
  const r1 = Number(document.getElementById("r1").value);
  const r2 = Number(document.getElementById("r2").value);

  document.getElementById("status").innerHTML = "送信中";

  const { O, B1 } = calcValues(B, S, T, V);

  const data = await sendToGAS(B1, V, r1, r2);

  render(B, data.M1, data.M2);
}

</script>

</body>
</html>
