<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算</title>
<style>
table {
  border-collapse: collapse;
}
td, th {
  border: 1px solid black;
  padding: 8px;
  text-align: center;
}
</style>
</head>

<body>

B <input id="B"><br>
S <input id="S"><br>
T <input id="T"><br>
V <input id="V"><br>
r1 <input id="r1"><br>
r2 <input id="r2"><br>

<button onclick="run()">実行</button>

<div id="status"></div>

<h3>貸借対照表</h3>
<table>
<tr><th>借方</th><th>貸方</th></tr>
<tr><td id="a"></td><td id="b"></td></tr>
<tr><td id="c"></td><td id="d"></td></tr>
</table>

<script>

function run() {

  var B = Number(document.getElementById("B").value);
  var S = Number(document.getElementById("S").value);
  var T = Number(document.getElementById("T").value);
  var V = Number(document.getElementById("V").value);
  var r1 = Number(document.getElementById("r1").value);
  var r2 = Number(document.getElementById("r2").value);

  var O = (B - S) / T;
  var B1 = B * V - O;

  document.getElementById("status").innerHTML = "送信中";

  fetch("GASのURL", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ V: V, r1: r1, r2: r2, B1: B1 })
  })
  .then(function(res){ return res.text(); })
  .then(function(text){

    var data = JSON.parse(text);

    var M1 = Number(data.M1);
    var M2 = Number(data.M2);

    document.getElementById("a").innerHTML = B - M1;
    document.getElementById("b").innerHTML = B - M2;
    document.getElementById("c").innerHTML = M1;
    document.getElementById("d").innerHTML = M2;

    document.getElementById("status").innerHTML = "完了";

  })
  .catch(function(){
    document.getElementById("status").innerHTML = "エラー";
  });
}

</script>

</body>
</html>
