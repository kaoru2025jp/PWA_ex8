<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算システム</title>
<style>
body { font-family: sans-serif; padding: 20px; }
input { display: block; margin: 5px 0; }
table { margin-top: 20px; border-collapse: collapse; }
td, th { border: 1px solid #000; padding: 8px; }
</style>
</head>

<body>

<h2>入力</h2>

<label>B <input id="B"></label>
<label>S <input id="S"></label>
<label>T <input id="T"></label>
<label>V <input id="V"></label>
<label>r1 <input id="r1"></label>
<label>r2 <input id="r2"></label>

<button onclick="runCalculation()">実行</button>

<h3>O（表示）</h3>
<div id="O"></div>

<h3>貸借対照表</h3>
<table>
<tr>
  <th>借方</th>
  <th>貸方</th>
</tr>
<tr>
  <td id="left1"></td>
  <td id="right1"></td>
</tr>
<tr>
  <td id="left2"></td>
  <td id="right2"></td>
</tr>
</table>

<script>
async function runCalculation() {

  const B = Number(document.getElementById("B").value);
  const S = Number(document.getElementById("S").value);
  const T = Number(document.getElementById("T").value);
  const V = Number(document.getElementById("V").value);
  const r1 = Number(document.getElementById("r1").value);
  const r2 = Number(document.getElementById("r2").value);

  // ① O
  const O = (B - S) / T;
  document.getElementById("O").textContent = O;

  // ② B1（非表示）
  const B1 = B * V - O;

  // ③ GAS送信
  const res = await fetch("https://script.google.com/macros/s/AKfycbxKoTYXvgmL26h4VmInZ5qEMU2RvUZyBa1RhEsgMYpZ_iTScrQdu16mMjcBUIjbVtq5cw/exec", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ V, r1, r2, B1 })
  });

  const data = await res.json();
  const M1 = data.M1;
  const M2 = data.M2;

  // ④ 貸借対照表
  document.getElementById("left1").textContent = B - M1;
  document.getElementById("left2").textContent = M1;
  document.getElementById("right1").textContent = B - M2;
  document.getElementById("right2").textContent = M2;
}
</script>

</body>
</html>
