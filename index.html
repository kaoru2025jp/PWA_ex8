<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算システム</title>
</head>

<body>

<h2>入力</h2>

B <input id="B"><br>
S <input id="S"><br>
T <input id="T"><br>
V <input id="V"><br>
r1 <input id="r1"><br>
r2 <input id="r2"><br>

<button onclick="calcO()">① Oを計算</button>
<div>O: <span id="O"></span></div>

<button onclick="calcBS()">② 貸借対照表</button>

<div id="status"></div>

<h3>貸借対照表</h3>
<table border="1">
<tr><th>借方</th><th>貸方</th></tr>
<tr>
<td id="left1"></td>
<td id="right1"></td>
</tr>
<tr>
<td id="left2"></td>
<td id="right2"></td>
</tr>
</table>

<script>
let O_fixed = null;

function calcO() {
  const B = Number(document.getElementById("B").value);
  const S = Number(document.getElementById("S").value);
  const T = Number(document.getElementById("T").value);

  O_fixed = (B - S) / T;
  document.getElementById("O").innerHTML = O_fixed;
}

async function calcBS() {

  if (O_fixed === null) {
    alert("先にOを計算してください");
    return;
  }

  document.getElementById("status").innerHTML = "送信中...";

  const B = Number(document.getElementById("B").value);
  const V = Number(document.getElementById("V").value);
  const r1 = Number(document.getElementById("r1").value);
  const r2 = Number(document.getElementById("r2").value);

  const B1 = B * V - O_fixed;

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbyciJrvsTLRBK1wCeR_mYY1JSMUbeMaaNVasifq35lur8Yv8takWGtQthrxpUmNqaxavw/exec", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ V, r1, r2, B1 })
    });

    const text = await res.text(); // ←一旦生で受ける
    document.getElementById("status").innerHTML = "受信成功: " + text;

    const data = JSON.parse(text);

    const M1 = data.M1;
    const M2 = data.M2;

    document.getElementById("left1").innerHTML = B - M1;
    document.getElementById("left2").innerHTML = M1;
    document.getElementById("right1").innerHTML = B - M2;
    document.getElementById("right2").innerHTML = M2;

  } catch (e) {
    document.getElementById("status").innerHTML = "エラー: " + e;
  }
}
</script>

</body>
</html>
