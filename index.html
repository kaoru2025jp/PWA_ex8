<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貸借対照表</title>
<style>
body {
  font-family: sans-serif;
  max-width: 600px;
  margin: auto;
  padding: 10px;
}
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}
td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}
</style>
</head>
<body>

<h3>① (B-S)/T = O</h3>

B<input id="B" type="number" value="100" oninput="calc()">
S<input id="S" type="number" value="20" oninput="calc()">

T（0〜3）<br>
<input type="range" id="T" min="0.01" max="3" step="0.01" value="1" oninput="calc()">
<span id="Tval">1.00</span>

<div>O: <span id="O"></span></div>

<h3>② B×V - O = B1</h3>

V<input id="V" type="number" value="1.5" oninput="calc()">
r1<input id="r1" type="number" value="0.5" step="0.01" oninput="calc()">
r2<input id="r2" type="number" value="0.8" step="0.01" oninput="calc()">

<div>B1: <span id="B1"></span></div>

<hr>

<table>
<tr>
<td>借方</td>
<td>貸方</td>
</tr>
<tr>
<td id="ca"></td>
<td id="cl"></td>
</tr>
<tr>
<td id="fa"></td>
<td id="cap"></td>
</tr>
</table>

<script>
const GAS_URL = "https://script.google.com/macros/s/XXXXXXXXXXXXXXXXXXXX/exec";

async function calc(){

  const B = Number(document.getElementById("B").value);
  const S = Number(document.getElementById("S").value);
  const T = Number(document.getElementById("T").value);
  const V = Number(document.getElementById("V").value);
  const r1 = Number(document.getElementById("r1").value);
  const r2 = Number(document.getElementById("r2").value);

  document.getElementById("Tval").innerText = T.toFixed(2);

  // ①
  const O = (B - S) / T;
  document.getElementById("O").innerText = O.toFixed(2);

  // ②
  const B1 = B * V - O;
  document.getElementById("B1").innerText = B1.toFixed(2);

  try{
    const res = await fetch(GAS_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({B1,V,r1,r2})
    });

    const d = await res.json();

    const M1 = d.M1;
    const M2 = d.M2;

    // 貸借対照表
    document.getElementById("ca").innerText = (B - M1).toFixed(2);
    document.getElementById("fa").innerText = M1.toFixed(2);
    document.getElementById("cl").innerText = (B - M2).toFixed(2);
    document.getElementById("cap").innerText = M2.toFixed(2);

  }catch(e){
    console.log(e);
  }
}

calc();
</script>

</body>
</html>
